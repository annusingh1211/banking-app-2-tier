name: Deploy SimpleBank 

on: 
 workflow_call: 

permissions: 
  id-token: write 
  contents: read

env:
  VERSION: v1
  REGION: eu-north-1
  ECR: 540034108652.dkr.ecr.eu-north-1.amazonaws.com
  IMAGE: 540034108652.dkr.ecr.eu-north-1.amazonaws.com/flask-app-simple-bank-new
  S3_BUCKET: s3://540034108652-devops-scripts

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: annusingh1211/banking-app-2-tier
          ref: main

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::540034108652:role/github-action-deploy-role-cicd-new
          aws-region: ${{ env.REGION }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ${{ env.REGION }} | \
          docker login --username AWS --password-stdin ${{ env.ECR }}

      - name: Build and push image
        run: |
          docker build -t ${{ env.IMAGE }}:${{ env.VERSION }} .
          docker push ${{ env.IMAGE }}:${{ env.VERSION }}

      - name: Upload docker-compose to S3
        run: |
          aws s3 cp docker-compose.yml ${{ env.S3_BUCKET }}/docker-compose.yml --region ${{ env.REGION }}

           - name: Deploy via SSM
        id: deploy
        run: |
          CMD_ID=$(aws ssm send-command \
            --targets "Key=tag:App,Values=flask" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy ${{ env.VERSION }} by ${{ github.actor }}" \
            --parameters '{
              "commands":[
                "set -e",

                "aws ecr get-login-password --region '${{ env.REGION }}' | docker login --username AWS --password-stdin '${{ env.ECR }}'",

                "mkdir -p /home/ubuntu/app",

                "aws s3 cp '${{ env.S3_BUCKET }}/docker-compose.yml' /home/ubuntu/app/docker-compose.yml --region '${{ env.REGION }}'",

                "docker pull '${{ env.IMAGE }}:${{ env.VERSION }}'",

                "docker stop simplebank 2>/dev/null || true",
                "docker rm simplebank 2>/dev/null || true",

                "if ! command -v docker-compose >/dev/null 2>&1; then curl -L https://github.com/docker/compose/releases/download/1.29.2/docker-compose-$(uname -s)-$(uname -m) -o /usr/local/bin/docker-compose && chmod +x /usr/local/bin/docker-compose; fi",

                "docker-compose version",

                "cd /home/ubuntu/app && IMAGE_TAG='${{ env.VERSION }}' docker-compose up -d",

                "sleep 15",

                "docker ps --filter name=simplebank --format \"{{.Status}}\" | grep -q Up && echo CONTAINER_RUNNING || (docker logs simplebank && exit 1)"
              ]
            }' \
            --query "Command.CommandId" \
            --output text \
            --region ${{ env.REGION }})

          echo "cmd_id=$CMD_ID" >> $GITHUB_OUTPUT